<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="countdownPage">

    <h1>🎂 Happy Birthday</h1>

    <p class="subtitle">
        Noch bis zu deiner Überraschung...
    </p>

    <div id="countdown">

        <div class="box">
            <span id="days">0</span>
            <small>Tage</small>
        </div>

        <div class="box">
            <span id="hours">0</span>
            <small>Std</small>
        </div>

        <div class="box">
            <span id="minutes">0</span>
            <small>Min</small>
        </div>

        <div class="box">
            <span id="seconds">0</span>
            <small>Sek</small>
        </div>

    </div>

</div>


<div id="giftPage">

    <div class="chest">

        📦

    </div>

    <h2>Alles Gute zum Geburtstag!</h2>

    <p>Klicke auf die Schatztruhe.</p>

</div>


<script src="script.js"></script>

</body>
</html>
